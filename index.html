<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./src/output.css" rel="stylesheet">
    <title>Document</title>
</head>

<body class="bg-[#FFF0F7] ">
    <header class="w-full py-5 top-0.5 fixed z-10 md:w-full mb:py-3 ">
        <div class="mx-auto flex items-center justify-between rounded-2xl bg-[#FFF0F7] px-6 py-4 shadow-lg ">
            <div class="hidden md:flex">
                <ul class="flex gap-6">
                    <li>
                        <a href="#">SHOP</a>
                    </li>
                    <li>
                        <a href="#">ABOUT</a>
                    </li>
                </ul>
            </div>

            <div>
                <img src="./src/img/Logo.png" alt="logo">
            </div>
            <div class="hidden md:flex">
                <ul class="flex gap-6">
                    <li>
                        <a href="#">BLOG</a>
                    </li>
                    <li>
                        <a href="#">CONTACT</a>
                    </li>
                    <li>
                        <a href="#">
                            <img src="./src/img/Icon.png" alt="cart">
                        </a>
                    </li>
            </div>
            <div class="md:hidden text-2xl cursor-pointer w-5 h-5">
                <img src="./src/img/Menu.png" alt="menu">
            </div>
        </div>
    </header>
    <section class="relative min-h-screen overflow-hidden">
        <img src="./src/img/Background.png" alt="Flowers background"
            class="absolute inset-0 h-full w-full object-cover" />
        <div class="relative z-10 flex min-h-screen items-center justify-center text-center px-4">
            <div class="max-w-3xl sm:max-w-lg">
                <h1 class="font-serif text-5xl italic text-white md:text-5xl">Elevate everyday moments to extraordinary.
                </h1>
                <button class="mt-5 rounded-full bg-[#f8dddd] px-6 py-3 text-xs font-bold uppercase">
                    Shop Our Fragrances
                </button>
            </div>
    </section>
    <section class="py-20 text-center content-center">
        <h4 class="uppercase">as seen in</h4>
        <div class="flex flex-wrap items-center justify-center gap-10 md:gap-20 mt-10 ">
            <img src="./src/img/flow.png" alt="Flow logo" class="w-20">
            <img src="./src/img/NINO.png" alt="NINO logo" class="w-20">
            <img src="./src/img/InTrend.png" alt="InTrend logo" class="w-20">
            <img src="./src/img/JUNE.png" alt="JUNE logo" class="w-20">
            <img src="./src/img/ZINE.png" alt="ZINE logo" class="w-20">
            <img src="./src/img/MAX.png" alt="MAX logo" class="w-20">
        </div>
    </section>
</body>

</html>
