<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./src/output.css" rel="stylesheet">
    <title>Document</title>
</head>

<body">
    <header class="w-full px-4 py-4">
        <div class="mx-auto flex items-center justify-between rounded-full bg-white px-6 py-4 shadow-md"">

            <img src=" ./src/img/logo.png" alt="logo" class="h-11.25 w-20" />

        <nav class="hidden sm: sm:flex items-center uppercase ">
            <ul class="flex items-center gap-7 ">
                <li class="hover:text-[#7f9d48]">
                    <a href="#">Home</a>
                </li>
                <li class="hover:text-[#7f9d48]">
                    <a href="#">Shop</a>
                </li>
                <li class="hover:text-[#7f9d48]">
                    <a href="#">About Us</a>
                </li>
                <li class="hover:text-[#7f9d48]">
                    <a href="#">Contact</a>
                </li>
            </ul>
        </nav>

        <div class="flex items-center gap-4">

            <div class="hidden lg:flex items-center gap-2"">
                <img src=" ./src/img/phone.png" alt="Phone" class="h-9 w-9" />

            <div class="leading-tight">
                <p class="text-[10px] text-gray-500">Call us Now</p>
                <p class="text-xs font-bold text-gray-800">
                    +1(212)255-511
                </p>
            </div>
        </div>

        <button class="flex h-10 w-10 items-center justify-center rounded-full">
            <img src="./src/img/search.png" alt="Search" class="h-8 w-8" />
        </button>

        <button
            class="hidden items-center gap-2 rounded-full bg-[#e7d24b] px-6 py-3 text-[11px] font-bold text-black md:flex">
            Get In Touch

            <img src="./src/img/arrow.png" alt="Arrow Icon" class="h-3 w-3" />
        </button>

        <button class="lg:hidden">
            <img src="./src/img/menu.png" alt="Menu Icon" class="h-6 w-6" />
        </button>

        </div>

        </div>
    </header>
    <section class="px-4 py-6">
        <div class="mx-auto flex w-full flex-col overflow-hidden rounded-3xl lg:flex-row">

            <div
                class="flex flex-1 flex-col justify-center bg-[#77a95c] px-6 py-10 text-white sm:px-8 sm:py-12 lg:px-10 lg:py-16">

                <div class="flex items-end gap-5 sm:gap-7 lg:gap-10">

                    <span
                        class="w-fit rounded-full border border-white/40 px-3 py-1 text-[8px] uppercase tracking-widest sm:px-4 sm:text-[10px]">
                        LET'S EAT HEALTHIER
                    </span>

                    <img src="./src/img/hero/gold.png" alt="Quality Stamp"
                        class="h-16 w-16 object-contain sm:h-20 sm:w-20 lg:h-24 lg:w-24" />

                </div>

                <h2 class="mt-6 text-3xl font-bold leading-tight sm:text-4xl lg:mt-8 lg:text-5xl">
                    Respect Nature, <br />
                    Gain Benefits
                </h2>

                <button
                    class="mt-6 flex w-fit items-center gap-2 rounded-full bg-white px-5 py-2 text-xs font-semibold text-black transition hover:bg-[#f3f3f3] sm:px-6 sm:py-3 sm:text-sm">
                    Contact Us

                    <img src="./src/img/arrow.png" alt="Arrow Icon" class="h-3 w-3 object-contain" />
                </button>

            </div>

            <div class="relative min-h-62.5 flex-1 sm:min-h-80 lg:min-h-100">
                <img src="./src/img/hero/background.png" alt="Farmer" class="absolute h-full w-full object-cover" />
            </div>

        </div>
    </section>
    </body>

</html>
